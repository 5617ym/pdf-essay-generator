<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولد الأسئلة</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Tajawal',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
background:
radial-gradient(circle at 20% 20%, rgba(60,120,255,.07), transparent 25%),
radial-gradient(circle at 80% 80%, rgba(140,80,255,.08), transparent 25%),
linear-gradient(135deg,#05070b,#070c14,#0b1320);
}

/* الخلفية */

.dashboard-bg{
position:fixed;
inset:0;
z-index:0;
overflow:hidden;
}

/* شبكة البيانات */

.data-grid{
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(80,120,255,.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(80,120,255,.08) 1px, transparent 1px);
background-size:45px 45px;
opacity:.25;
}

/* المعادلات */

.eq{
position:absolute;
color:rgba(255,255,255,.08);
font-family:'Caveat',cursive;
font-weight:700;
white-space:nowrap;
pointer-events:none;
font-size:10px;
}

/* النجوم */

.data-star{
position:absolute;
border-radius:50%;
background:#ffffff;

box-shadow:
0 0 6px rgba(255,255,255,.9),
0 0 12px rgba(255,255,255,.7),
0 0 18px rgba(255,255,255,.4),
0 0 30px rgba(120,180,255,.4);

animation:starPulse 2s ease-in-out infinite,
starDrift 10s linear infinite;
}

@keyframes starPulse{
0%,100%{
transform:scale(.8);
opacity:.6
}
50%{
transform:scale(1.8);
opacity:1
}
}

@keyframes starDrift{
0%{transform:translate(0,0)}
25%{transform:translate(4px,-6px)}
50%{transform:translate(-3px,-10px)}
75%{transform:translate(6px,-3px)}
100%{transform:translate(0,0)}
}

/* الشهاب */

.meteor{
position:absolute;
width:250px;
height:3px;

background:linear-gradient(
90deg,
rgba(255,255,255,1),
rgba(255,255,255,.8),
rgba(255,255,255,.3),
transparent
);

filter:blur(.4px);

box-shadow:
0 0 10px rgba(255,255,255,.9),
0 0 25px rgba(255,255,255,.7),
0 0 50px rgba(120,180,255,.5);

transform:rotate(-25deg);

animation:meteorMove 2.2s linear forwards;
}

@keyframes meteorMove{

0%{
transform:translate(-300px,-200px) rotate(-25deg);
opacity:0
}

10%{opacity:1}

100%{
transform:translate(120vw,70vh) rotate(-25deg);
opacity:0
}

}

/* البطاقة */

.card{
position:relative;
z-index:2;
width:560px;
max-width:90%;

background:rgba(6,10,16,.92);
backdrop-filter:blur(14px);

border-radius:28px;
padding:36px;

border:1px solid rgba(255,255,255,.05);

box-shadow:
0 20px 60px rgba(0,0,0,.5),
inset 0 1px 0 rgba(255,255,255,.05);
}

.welcome{
font-size:36px;
font-weight:800;
color:#f5efe6;
text-align:center;
margin:0
}

.sub{
text-align:center;
color:#c6b9a7;
font-size:22px;
margin-bottom:28px
}

.field{margin-bottom:18px}

label{
display:block;
margin-bottom:6px;
color:#eee
}

select{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #0b5cd6;
background:#111824;
color:#fff;
}

.drop-zone{
border:2px dashed #0b6cf0;
border-radius:18px;
padding:28px;
text-align:center;
background:#0f1622;
cursor:pointer
}

button{
width:100%;
margin-top:12px;
border:none;
padding:16px;
border-radius:18px;
font-weight:800;
font-size:18px;
color:#fff;

background:linear-gradient(135deg,#18b7df,#2e67f0,#5320d6);
}

.note{
text-align:center;
margin-top:12px;
color:#a9a091
}

</style>
</head>

<body>

<div class="dashboard-bg" id="dashboardBg">

<div class="data-grid"></div>

</div>


<div class="card">

<p class="welcome">ارحب مشعل</p>
<p class="sub">يوسف موصيني عليك و انا بخدمتك</p>

<div class="field">
<label>رفع الملف</label>
<div class="drop-zone">اسحب ملف PDF هنا</div>
</div>

<div class="field">
<label>عدد الأسئلة</label>
<select>
<option>5</option>
<option>10</option>
<option>15</option>
<option>20</option>
</select>
</div>

<div class="field">
<label>نوع الأسئلة</label>
<select>
<option>مقالية</option>
<option>اختيار من متعدد</option>
<option>مقالية + اختيار من متعدد</option>
<option>مسائل رياضية</option>
</select>
</div>

<button>توليد الأسئلة</button>

<div class="note">
النسخة الحالية واجهة أولية
</div>

</div>


<script>

const bg=document.getElementById("dashboardBg")

/* المعادلات */

const formulas=[
"x²+y²=r²",
"sin²x+cos²x=1",
"π≈3.14",
"dy/dx",
"∑n",
"∫f(x)",
"f(x)",
"x²",
"y²",
"log(x)",
"tanθ",
"λ",
"µ+σ",
"A=Lw"
]

function createFormula(){

let el=document.createElement("span")

el.className="eq"

el.textContent=formulas[Math.floor(Math.random()*formulas.length)]

el.style.left=Math.random()*100+"vw"
el.style.top=Math.random()*100+"vh"

el.style.fontSize=(6+Math.random()*8)+"px"

el.style.transform="rotate("+(Math.random()*20-10)+"deg)"

bg.appendChild(el)

}

for(let i=0;i<2600;i++) createFormula()



/* النجوم */

function createStar(){

let star=document.createElement("span")

star.className="data-star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

let size=2+Math.random()*4

star.style.width=size+"px"
star.style.height=size+"px"

bg.appendChild(star)

}

for(let i=0;i<450;i++) createStar()



/* الشهاب */

function createMeteor(){

let meteor=document.createElement("div")

meteor.className="meteor"

meteor.style.top=Math.random()*40+"vh"

bg.appendChild(meteor)

setTimeout(()=>{
meteor.remove()
},2500)

}

/* شهاب كل فترة */

setInterval(createMeteor,9000)

</script>

</body>
</html>
