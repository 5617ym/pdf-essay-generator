<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مولد الأسئلة</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:'Tajawal',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
      position:relative;
      background:
        radial-gradient(circle at 18% 22%, rgba(34,211,238,0.16), transparent 24%),
        radial-gradient(circle at 82% 78%, rgba(139,92,246,0.16), transparent 24%),
        linear-gradient(135deg, #06101d 0%, #0a1730 42%, #121b46 100%);
    }

    /* الخلفية الرياضية */
    .math-bg{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    /* طبقة ثابتة خفيفة حتى يظهر الطابع الرياضي دائمًا */
    .math-overlay{
      position:absolute;
      inset:0;
      opacity:0.14;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.08) 0 1px, transparent 1px),
        radial-gradient(circle at 86% 20%, rgba(255,255,255,0.06) 0 1px, transparent 1px),
        radial-gradient(circle at 25% 72%, rgba(255,255,255,0.05) 0 1px, transparent 1px);
      background-size: 280px 280px, 340px 340px, 220px 220px;
    }

    .equation-line{
      position:absolute;
      color:rgba(160, 210, 255, 0.11);
      font-size:18px;
      font-weight:700;
      letter-spacing:1px;
      white-space:nowrap;
      text-shadow:0 0 10px rgba(59,130,246,0.08);
    }

    .eq1{ top:12%; left:6%; transform:rotate(-7deg); }
    .eq2{ top:22%; right:8%; transform:rotate(5deg); }
    .eq3{ bottom:18%; left:10%; transform:rotate(6deg); }
    .eq4{ bottom:10%; right:12%; transform:rotate(-5deg); }

    .math-symbol{
      position:absolute;
      font-weight:800;
      user-select:none;
      white-space:nowrap;
      opacity:0;
      animation:floatUp linear infinite;
      text-shadow:0 0 12px rgba(59,130,246,0.20);
      filter:drop-shadow(0 0 6px rgba(59,130,246,0.08));
    }

    .math-blue{ color:rgba(125, 211, 252, 0.34); }
    .math-cyan{ color:rgba(34, 211, 238, 0.30); }
    .math-purple{ color:rgba(167, 139, 250, 0.28); }
    .math-soft{ color:rgba(255,255,255,0.18); }

    @keyframes floatUp{
      0%{
        transform:translateY(110vh) translateX(0) rotate(0deg) scale(0.92);
        opacity:0;
      }
      10%{
        opacity:0.9;
      }
      50%{
        transform:translateY(45vh) translateX(12px) rotate(7deg) scale(1);
        opacity:1;
      }
      100%{
        transform:translateY(-18vh) translateX(-10px) rotate(14deg) scale(1.04);
        opacity:0;
      }
    }

    .card{
      position:relative;
      z-index:2;
      width:100%;
      max-width:560px;
      background:rgba(6,10,16,0.92);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:28px;
      padding:34px 28px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .welcome{
      font-size:36px;
      font-weight:800;
      margin:0 0 8px;
      color:#f4ede3;
      text-align:center;
    }

    .sub{
      font-size:26px;
      font-weight:500;
      margin:0 0 28px;
      color:#c8baa6;
      text-align:center;
    }

    .field{
      margin-bottom:18px;
    }

    label{
      display:block;
      font-size:15px;
      font-weight:700;
      color:#f2e7d8;
      margin-bottom:8px;
    }

    select{
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid #0b5cd6;
      background:rgba(18,20,26,0.60);
      font-size:16px;
      font-family:'Tajawal',sans-serif;
      outline:none;
      transition:0.2s ease;
      color:#f5efe6;
    }

    select:focus{
      border-color:#38bdf8;
      box-shadow:0 0 0 4px rgba(56,189,248,0.12);
      background:rgba(18,20,26,0.85);
    }

    .drop-zone{
      border:2px dashed #0b6cf0;
      border-radius:20px;
      padding:28px 18px;
      text-align:center;
      cursor:pointer;
      background:rgba(18,20,26,0.50);
      transition:0.25s ease;
      position:relative;
      overflow:hidden;
    }

    .drop-zone::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.03), transparent);
      transform:translateX(-100%);
      transition:0.5s ease;
    }

    .drop-zone:hover{
      background:rgba(21,28,42,0.78);
      border-color:#2ea9ff;
      box-shadow:0 0 25px rgba(28,105,255,0.10);
    }

    .drop-zone:hover::before{
      transform:translateX(100%);
    }

    .drop-zone.dragover{
      background:rgba(21,28,42,0.92);
      border-color:#38bdf8;
      transform:scale(1.01);
      box-shadow:0 0 30px rgba(56,189,248,0.15);
    }

    .drop-zone p{
      margin:0 0 8px;
      font-weight:800;
      font-size:18px;
      color:#f5efe6;
    }

    .drop-zone span{
      display:block;
      font-size:14px;
      color:#c7b9a7;
      margin-bottom:12px;
    }

    .file-name{
      margin-top:10px;
      font-size:14px;
      color:#57b9ff;
      font-weight:700;
      word-break:break-word;
    }

    button{
      width:100%;
      border:none;
      border-radius:18px;
      padding:16px;
      font-size:18px;
      font-weight:800;
      font-family:'Tajawal',sans-serif;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,#18b7df 0%, #2e67f0 55%, #5320d6 100%);
      box-shadow:0 14px 30px rgba(37,99,235,0.28);
      transition:transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 34px rgba(37,99,235,0.32);
    }

    .note{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#b8ab97;
    }

    @media (max-width:640px){
      .card{
        padding:28px 18px;
        border-radius:24px;
      }

      .welcome{
        font-size:30px;
      }

      .sub{
        font-size:21px;
      }

      .equation-line{
        font-size:14px;
      }
    }
  </style>
</head>
<body>

  <div class="math-bg" id="mathBg">
    <div class="math-overlay"></div>

    <div class="equation-line eq1">x² + y² = r²</div>
    <div class="equation-line eq2">∫ f(x) dx = F(x) + C</div>
    <div class="equation-line eq3">dy/dx = λy</div>
    <div class="equation-line eq4">∑ an = a1 + a2 + ...</div>
  </div>

  <div class="card">
    <p class="welcome">ارحب مشعل</p>
    <p class="sub">يوسف موصيني عليك و انا بخدمتك</p>

    <div class="field">
      <label for="pdfFile">رفع الملف</label>
      <div class="drop-zone" id="dropZone">
        <p>اسحب ملف PDF هنا</p>
        <span>أو اضغط لاختيار الملف</span>
        <input id="pdfFile" type="file" accept=".pdf" hidden>
        <div class="file-name" id="fileName">لم يتم اختيار ملف بعد</div>
      </div>
    </div>

    <div class="field">
      <label for="questionCount">عدد الأسئلة</label>
      <select id="questionCount">
        <option>5</option>
        <option>10</option>
        <option>15</option>
        <option>20</option>
      </select>
    </div>

    <div class="field">
      <label for="questionType">نوع الأسئلة</label>
      <select id="questionType">
        <option>مقالية</option>
        <option>اختيار من متعدد</option>
        <option>مقالية + اختيار من متعدد</option>
        <option>مسائل رياضية</option>
        <option>الكل</option>
      </select>
    </div>

    <button type="button">توليد الأسئلة</button>
    <div class="note">النسخة الحالية واجهة أولية، وسيتم لاحقًا ربطها بقراءة الملف وتوليد الأسئلة منه.</div>
  </div>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("pdfFile");
    const fileName = document.getElementById("fileName");

    dropZone.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      fileName.textContent = fileInput.files.length ? fileInput.files[0].name : "لم يتم اختيار ملف بعد";
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        fileName.textContent = e.dataTransfer.files[0].name;
      }
    });

    const mathBg = document.getElementById("mathBg");
    const symbols = [
      "+","-","×","÷","=","≠","≈","√","∑","∫","π","∞","∆","∂","θ","λ",
      "x²","y²","a+b","dy/dx","f(x)","µ","σ","cos","sin","tan","log","∇","≤","≥","P(A)"
    ];
    const classes = ["math-blue","math-cyan","math-purple","math-soft"];

    function createSymbol() {
      const el = document.createElement("span");
      el.className = "math-symbol " + classes[Math.floor(Math.random() * classes.length)];
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      el.style.left = Math.random() * 100 + "vw";
      el.style.top = (100 + Math.random() * 18) + "vh";
      el.style.fontSize = (14 + Math.random() * 18) + "px";
      el.style.animationDuration = (10 + Math.random() * 10) + "s";
      mathBg.appendChild(el);

      setTimeout(() => el.remove(), 22000);
    }

    for (let i = 0; i < 120; i++) {
      setTimeout(createSymbol, i * 80);
    }

    setInterval(createSymbol, 180);
  </script>

</body>
</html>
