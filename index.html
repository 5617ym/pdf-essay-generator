<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مولد الأسئلة</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:'Tajawal',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
      position:relative;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.02), transparent 20%),
        radial-gradient(circle at 82% 78%, rgba(255,255,255,0.015), transparent 18%),
        linear-gradient(135deg, #07090d 0%, #0a0d12 42%, #11151d 100%);
    }

    .chalkboard-bg{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
      opacity:0.98;
    }

    .chalk-noise{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 10% 18%, rgba(255,255,255,0.018) 0 1px, transparent 1px),
        radial-gradient(circle at 80% 22%, rgba(255,255,255,0.016) 0 1px, transparent 1px),
        radial-gradient(circle at 30% 78%, rgba(255,255,255,0.014) 0 1px, transparent 1px),
        radial-gradient(circle at 72% 70%, rgba(255,255,255,0.014) 0 1px, transparent 1px);
      background-size: 110px 110px, 140px 140px, 130px 130px, 120px 120px;
      mix-blend-mode:screen;
    }

    .eq{
      position:absolute;
      color:rgba(255,255,255,0.12);
      font-family:'Caveat', cursive;
      font-weight:700;
      white-space:nowrap;
      pointer-events:none;
      user-select:none;
      mix-blend-mode:screen;
      text-shadow:0 0 2px rgba(255,255,255,0.02);
      letter-spacing:0.3px;
      line-height:1;
    }

    .eq-soft{ color:rgba(255,255,255,0.08); }
    .eq-mid{ color:rgba(255,255,255,0.13); }
    .eq-strong{ color:rgba(255,255,255,0.18); }
    .eq-glow{
      color:rgba(148, 220, 255, 0.34);
      text-shadow:
        0 0 4px rgba(125,211,252,0.10),
        0 0 10px rgba(56,189,248,0.12),
        0 0 18px rgba(37,99,235,0.08);
    }

    .graph,
    .hyperbola,
    .unit-circle,
    .small-circle,
    .axis-block{
      position:absolute;
      opacity:0.14;
    }

    .graph{ top:17%; left:50%; width:180px; height:90px; }
    .hyperbola{ top:50%; right:18%; width:120px; height:95px; }
    .unit-circle{ right:7%; bottom:7%; width:120px; height:120px; }
    .small-circle{ top:18%; left:18%; width:54px; height:54px; }
    .axis-block{ bottom:15%; left:31%; width:90px; height:80px; }

    .graph svg,
    .hyperbola svg,
    .unit-circle svg,
    .axis-block svg{
      width:100%;
      height:100%;
    }

    .small-circle::before{
      content:"";
      position:absolute;
      inset:0;
      border:2px solid rgba(255,255,255,0.14);
      border-radius:50%;
    }

    .small-circle::after{
      content:"";
      position:absolute;
      top:26px;
      left:22px;
      width:22px;
      height:2px;
      background:rgba(255,255,255,0.14);
    }

    .float-symbol{
      position:absolute;
      color:rgba(255,255,255,0.10);
      font-weight:700;
      font-family:'Caveat', cursive;
      user-select:none;
      white-space:nowrap;
      animation:floatSlow linear infinite;
      opacity:0;
      text-shadow:0 0 6px rgba(255,255,255,0.03);
    }

    .float-symbol.glow{
      color:#7dd3fc;
      text-shadow:
        0 0 4px #7dd3fc,
        0 0 10px #38bdf8,
        0 0 20px #1d4ed8;
    }

    @keyframes floatSlow{
      0%{
        transform:translateY(110vh) rotate(0deg);
        opacity:0;
      }
      10%{
        opacity:0.7;
      }
      70%{
        opacity:0.9;
      }
      100%{
        transform:translateY(-10vh) rotate(8deg);
        opacity:0;
      }
    }

    .card{
      position:relative;
      z-index:2;
      width:100%;
      max-width:560px;
      background:rgba(6,10,16,0.92);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:28px;
      padding:34px 28px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .welcome{
      font-size:36px;
      font-weight:800;
      margin:0 0 8px;
      color:#f4ede3;
      text-align:center;
    }

    .sub{
      font-size:26px;
      font-weight:500;
      margin:0 0 28px;
      color:#c8baa6;
      text-align:center;
    }

    .field{
      margin-bottom:18px;
    }

    label{
      display:block;
      font-size:15px;
      font-weight:700;
      color:#f2e7d8;
      margin-bottom:8px;
    }

    select{
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid #0b5cd6;
      background:rgba(18,20,26,0.60);
      font-size:16px;
      font-family:'Tajawal',sans-serif;
      outline:none;
      transition:0.2s ease;
      color:#f5efe6;
    }

    select:focus{
      border-color:#38bdf8;
      box-shadow:0 0 0 4px rgba(56,189,248,0.12);
      background:rgba(18,20,26,0.85);
    }

    .drop-zone{
      border:2px dashed #0b6cf0;
      border-radius:20px;
      padding:28px 18px;
      text-align:center;
      cursor:pointer;
      background:rgba(18,20,26,0.50);
      transition:0.25s ease;
      position:relative;
      overflow:hidden;
    }

    .drop-zone::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.03), transparent);
      transform:translateX(-100%);
      transition:0.5s ease;
    }

    .drop-zone:hover{
      background:rgba(21,28,42,0.78);
      border-color:#2ea9ff;
      box-shadow:0 0 25px rgba(28,105,255,0.10);
    }

    .drop-zone:hover::before{
      transform:translateX(100%);
    }

    .drop-zone.dragover{
      background:rgba(21,28,42,0.92);
      border-color:#38bdf8;
      transform:scale(1.01);
      box-shadow:0 0 30px rgba(56,189,248,0.15);
    }

    .drop-zone p{
      margin:0 0 8px;
      font-weight:800;
      font-size:18px;
      color:#f5efe6;
    }

    .drop-zone span{
      display:block;
      font-size:14px;
      color:#c7b9a7;
      margin-bottom:12px;
    }

    .file-name{
      margin-top:10px;
      font-size:14px;
      color:#57b9ff;
      font-weight:700;
      word-break:break-word;
    }

    button{
      width:100%;
      border:none;
      border-radius:18px;
      padding:16px;
      font-size:18px;
      font-weight:800;
      font-family:'Tajawal',sans-serif;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,#18b7df 0%, #2e67f0 55%, #5320d6 100%);
      box-shadow:0 14px 30px rgba(37,99,235,0.28);
      transition:transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 34px rgba(37,99,235,0.32);
    }

    .note{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#b8ab97;
    }

    @media (max-width:900px){
      .eq{
        font-size:12px !important;
      }

      .graph,
      .hyperbola,
      .unit-circle,
      .small-circle,
      .axis-block{
        opacity:0.10;
      }
    }

    @media (max-width:640px){
      .card{
        padding:28px 18px;
        border-radius:24px;
      }

      .welcome{
        font-size:30px;
      }

      .sub{
        font-size:21px;
      }
    }
  </style>
</head>
<body>

  <div class="chalkboard-bg" id="chalkboardBg">
    <div class="chalk-noise"></div>

    <div class="small-circle"></div>

    <div class="graph">
      <svg viewBox="0 0 180 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="45" x2="170" y2="45" stroke="rgba(255,255,255,0.16)" stroke-width="1.6"/>
        <line x1="90" y1="8" x2="90" y2="82" stroke="rgba(255,255,255,0.16)" stroke-width="1.6"/>
        <path d="M10 45 C26 22, 46 22, 62 45 S98 68, 114 45 S150 22, 170 45"
              stroke="rgba(255,255,255,0.20)" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="hyperbola">
      <svg viewBox="0 0 120 95" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="8" y1="47" x2="112" y2="47" stroke="rgba(255,255,255,0.14)" stroke-width="1.6"/>
        <line x1="60" y1="8" x2="60" y2="87" stroke="rgba(255,255,255,0.14)" stroke-width="1.6"/>
        <path d="M14 31 C25 31, 35 26, 43 14" stroke="rgba(255,255,255,0.18)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M14 63 C25 63, 35 68, 43 80" stroke="rgba(255,255,255,0.18)" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="unit-circle">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="36" stroke="rgba(255,255,255,0.20)" stroke-width="2"/>
        <line x1="10" y1="60" x2="110" y2="60" stroke="rgba(255,255,255,0.12)" stroke-width="1.6"/>
        <line x1="60" y1="10" x2="60" y2="110" stroke="rgba(255,255,255,0.12)" stroke-width="1.6"/>
        <line x1="60" y1="60" x2="86" y2="39" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
      </svg>
    </div>

    <div class="axis-block">
      <svg viewBox="0 0 90 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="40" x2="80" y2="40" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
        <line x1="45" y1="10" x2="45" y2="70" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
      </svg>
    </div>
  </div>

  <div class="card">
    <p class="welcome">ارحب مشعل</p>
    <p class="sub">يوسف موصيني عليك و انا بخدمتك</p>

    <div class="field">
      <label for="pdfFile">رفع الملف</label>
      <div class="drop-zone" id="dropZone">
        <p>اسحب ملف PDF هنا</p>
        <span>أو اضغط لاختيار الملف</span>
        <input id="pdfFile" type="file" accept=".pdf" hidden>
        <div class="file-name" id="fileName">لم يتم اختيار ملف بعد</div>
      </div>
    </div>

    <div class="field">
      <label for="questionCount">عدد الأسئلة</label>
      <select id="questionCount">
        <option>5</option>
        <option>10</option>
        <option>15</option>
        <option>20</option>
      </select>
    </div>

    <div class="field">
      <label for="questionType">نوع الأسئلة</label>
      <select id="questionType">
        <option>مقالية</option>
        <option>اختيار من متعدد</option>
        <option>مقالية + اختيار من متعدد</option>
        <option>مسائل رياضية</option>
        <option>الكل</option>
      </select>
    </div>

    <button type="button">توليد الأسئلة</button>
    <div class="note">النسخة الحالية واجهة أولية، وسيتم لاحقًا ربطها بقراءة الملف وتوليد الأسئلة منه.</div>
  </div>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("pdfFile");
    const fileName = document.getElementById("fileName");

    dropZone.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      fileName.textContent = fileInput.files.length ? fileInput.files[0].name : "لم يتم اختيار ملف بعد";
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        fileName.textContent = e.dataTransfer.files[0].name;
      }
    });

    const chalkboardBg = document.getElementById("chalkboardBg");

    const formulas = [
      "n = ∑ Cₖ xⁿ⁻ᵏ yᵏ(x+y)",
      "x+y",
      "2x² + 3x + 4 = y",
      "3⁰ = 1",
      "loga 1 = 0",
      "a³+b³=(a+b)(a²-ab+b²)",
      "logc(a/b)=logc a − logc b",
      "∑k = ½ n(n+1)",
      "a²+b²",
      "y = ax² + bx + c",
      "a²−b²",
      "2√",
      "²(1/4)=4⁻²",
      "cos x",
      "y = sinx",
      "c =",
      "sin x",
      "sin²y + cos²y = 1",
      "f(x)=x²+1",
      "log x",
      "x dx∫",
      "a-b",
      "dy/dx",
      "x²+y²=r²",
      "A = Lw",
      "x²",
      "µ + σ",
      "P(A)",
      "x/3",
      "c = aᶜ / bᶜ(a/b)",
      "f∇",
      "x≤y",
      "π ≈ 3.14",
      "tan θ",
      "∂/∂x",
      "√2",
      "x/2 + y/3",
      "f’(x)",
      "∞",
      "λy",
      "a+b",
      "∆",
      "log y",
      "cos y",
      "sin y",
      "x−y",
      "P(B)",
      "μ",
      "σ²",
      "x/4",
      "kλ",
      "tan x",
      "∫ y dx",
      "a²+b²",
      "∑n",
      "x+y",
      "x²+y²",
      "f(x)",
      "y²",
      "x²",
      "μ + σ",
      "π",
      "log",
      "sin",
      "cos"
    ];

    function createFormula() {
      const el = document.createElement("span");

      const glowChance = Math.random() > 0.92;
      const variants = glowChance
        ? ["eq","eq-glow"]
        : ["eq","eq-soft","eq-mid","eq-strong"];

      const chosen = variants[Math.floor(Math.random() * variants.length)];
      el.className = glowChance ? "eq eq-glow" : "eq " + chosen;

      el.textContent = formulas[Math.floor(Math.random() * formulas.length)];

      el.style.left = Math.random() * 100 + "vw";
      el.style.top = Math.random() * 100 + "vh";
      el.style.fontSize = (7 + Math.random() * 8) + "px";
      el.style.transform = "rotate(" + (Math.random() * 18 - 9) + "deg)";

      chalkboardBg.appendChild(el);
    }

    for (let i = 0; i < 2200; i++) {
      createFormula();
    }

    const floatSymbols = [
      "+","-","×","÷","=","√","∑","π","∞","∆","∂","θ","λ","x²","y²","f(x)","dy/dx","log","sin","cos","tan","μ","σ","✦","✧","•","·","∗"
    ];

    function createFloatSymbol(){
      const el = document.createElement("span");
      const isGlow = Math.random() > 0.75;
      el.className = isGlow ? "float-symbol glow" : "float-symbol";
      el.textContent = floatSymbols[Math.floor(Math.random() * floatSymbols.length)];
      el.style.left = Math.random() * 100 + "vw";
      el.style.top = (100 + Math.random() * 5) + "vh";
      el.style.fontSize = (6 + Math.random() * 5) + "px";
      el.style.animationDuration = (18 + Math.random() * 12) + "s";

      chalkboardBg.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 32000);
    }

    for(let i = 0; i < 520; i++){
      setTimeout(createFloatSymbol, i * 18);
    }

    setInterval(createFloatSymbol, 45);
  </script>

</body>
</html>
