<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مولد الأسئلة</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:'Tajawal',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
      color:#0f172a;
      background:
        radial-gradient(circle at top left, rgba(0,198,255,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(124,58,237,0.18), transparent 28%),
        linear-gradient(135deg, #07111f 0%, #0b1730 45%, #141b42 100%);
      position:relative;
    }

    .math-background{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .math-symbol{
      position:absolute;
      color:rgba(255,255,255,0.08);
      font-size:14px;
      font-weight:700;
      user-select:none;
      animation:floatMath linear infinite;
      text-shadow:0 0 8px rgba(59,130,246,0.08);
    }

    .math-symbol.alt{
      color:rgba(125,211,252,0.09);
    }

    .math-symbol.soft{
      color:rgba(196,181,253,0.08);
    }

    @keyframes floatMath{
      0%{
        transform:translateY(110vh) rotate(0deg);
        opacity:0;
      }
      15%{
        opacity:1;
      }
      85%{
        opacity:1;
      }
      100%{
        transform:translateY(-15vh) rotate(18deg);
        opacity:0;
      }
    }

    .card{
      position:relative;
      z-index:2;
      width:100%;
      max-width:560px;
      background:rgba(18,18,20,0.92);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:28px;
      padding:34px 28px;
      box-shadow:0 20px 60px rgba(0,0,0,0.28);
    }

    .welcome{
      font-size:36px;
      font-weight:800;
      margin:0 0 8px;
      color:#f5efe6;
      text-align:center;
    }

    .sub{
      font-size:26px;
      font-weight:500;
      margin:0 0 28px;
      color:#c7b9a7;
      text-align:center;
    }

    .field{
      margin-bottom:18px;
    }

    label{
      display:block;
      font-size:15px;
      font-weight:700;
      color:#f2e7d8;
      margin-bottom:8px;
    }

    select{
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid #0b5cd6;
      background:rgba(18,20,26,0.6);
      font-size:16px;
      font-family:'Tajawal',sans-serif;
      outline:none;
      transition:0.2s ease;
      color:#f5efe6;
    }

    select:focus{
      border-color:#38bdf8;
      box-shadow:0 0 0 4px rgba(56,189,248,0.12);
      background:rgba(18,20,26,0.85);
    }

    .drop-zone{
      border:2px dashed #0b6cf0;
      border-radius:20px;
      padding:28px 18px;
      text-align:center;
      cursor:pointer;
      background:rgba(18,20,26,0.50);
      transition:0.25s ease;
      position:relative;
      overflow:hidden;
    }

    .drop-zone:hover{
      background:rgba(21,28,42,0.78);
      border-color:#2ea9ff;
      box-shadow:0 0 25px rgba(28,105,255,0.10);
    }

    .drop-zone.dragover{
      background:rgba(21,28,42,0.92);
      border-color:#38bdf8;
      transform:scale(1.01);
      box-shadow:0 0 30px rgba(56,189,248,0.15);
    }

    .drop-zone p{
      margin:0 0 8px;
      font-weight:800;
      font-size:18px;
      color:#f5efe6;
    }

    .drop-zone span{
      display:block;
      font-size:14px;
      color:#c7b9a7;
      margin-bottom:12px;
    }

    .file-name{
      margin-top:10px;
      font-size:14px;
      color:#57b9ff;
      font-weight:700;
      word-break:break-word;
    }

    button{
      width:100%;
      border:none;
      border-radius:18px;
      padding:16px;
      font-size:18px;
      font-weight:800;
      font-family:'Tajawal',sans-serif;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,#18b7df 0%, #2e67f0 55%, #5320d6 100%);
      box-shadow:0 14px 30px rgba(37,99,235,0.28);
      transition:transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 34px rgba(37,99,235,0.32);
    }

    .note{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#b8ab97;
    }

    @media (max-width:640px){
      .card{
        padding:28px 18px;
        border-radius:24px;
      }

      .welcome{
        font-size:30px;
      }

      .sub{
        font-size:21px;
      }
    }
  </style>
</head>
<body>

  <div class="math-background" id="mathBackground"></div>

  <div class="card">
    <p class="welcome">ارحب مشعل</p>
    <p class="sub">يوسف موصيني عليك و انا بخدمتك</p>

    <div class="field">
      <label for="pdfFile">رفع الملف</label>

      <div class="drop-zone" id="dropZone">
        <p>اسحب ملف PDF هنا</p>
        <span>أو اضغط لاختيار الملف</span>
        <input id="pdfFile" type="file" accept=".pdf" hidden>
        <div class="file-name" id="fileName">لم يتم اختيار ملف بعد</div>
      </div>
    </div>

    <div class="field">
      <label for="questionCount">عدد الأسئلة</label>
      <select id="questionCount">
        <option>5</option>
        <option>10</option>
        <option>15</option>
        <option>20</option>
      </select>
    </div>

    <div class="field">
      <label for="questionType">نوع الأسئلة</label>
      <select id="questionType">
        <option>مقالية</option>
        <option>اختيار من متعدد</option>
        <option>مقالية + اختيار من متعدد</option>
        <option>مسائل رياضية</option>
        <option>الكل</option>
      </select>
    </div>

    <button type="button">توليد الأسئلة</button>

    <div class="note">النسخة الحالية واجهة أولية، وسيتم لاحقًا ربطها بقراءة الملف وتوليد الأسئلة منه.</div>
  </div>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("pdfFile");
    const fileName = document.getElementById("fileName");

    dropZone.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) {
        fileName.textContent = fileInput.files[0].name;
      } else {
        fileName.textContent = "لم يتم اختيار ملف بعد";
      }
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");

      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        fileName.textContent = e.dataTransfer.files[0].name;
      }
    });

    const mathBackground = document.getElementById("mathBackground");
    const symbols = [
      "+","-","×","÷","=","≠","≈","√","∑","∫","π","∞","∆","∂","θ","λ",
      "x²","y²","a+b","dy/dx","f(x)","( )","[ ]","{ }","µ","σ","cos","sin"
    ];

    function createMathSymbol() {
      const symbol = document.createElement("span");
      symbol.className = "math-symbol";

      const styleRand = Math.random();
      if (styleRand > 0.66) symbol.classList.add("alt");
      else if (styleRand > 0.33) symbol.classList.add("soft");

      symbol.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      symbol.style.left = Math.random() * 100 + "vw";
      symbol.style.top = (100 + Math.random() * 10) + "vh";
      symbol.style.fontSize = (11 + Math.random() * 16) + "px";
      symbol.style.animationDuration = (14 + Math.random() * 16) + "s";
      symbol.style.animationDelay = (Math.random() * 2) + "s";

      mathBackground.appendChild(symbol);

      setTimeout(() => {
        symbol.remove();
      }, 32000);
    }

    for (let i = 0; i < 28; i++) {
      setTimeout(createMathSymbol, i * 250);
    }

    setInterval(createMathSymbol, 700);
  </script>

</body>
</html>
