<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Question Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Tajawal', sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
color:white;
}

.container{
background:white;
color:#222;
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
text-align:center;
}

.welcome{
font-size:34px;
font-weight:700;
margin-bottom:5px;
}

.sub{
font-size:18px;
color:#666;
margin-bottom:30px;
}

input, select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="container">

<div class="welcome">
ارحب مشعل
</div>

<div class="sub">
يوسف موصيني عليك و انا بخدمتك
</div>

<input type="file" accept=".pdf">

<select>
<option>عدد الأسئلة</option>
<option>5</option>
<option>10</option>
<option>15</option>
<option>20</option>
</select>

<select>
<option>نوع الأسئلة</option>
<option>مقالية</option>
<option>اختيار من متعدد</option>
<option>مقالية + اختيار من متعدد</option>
<option>مسائل رياضية</option>
<option>الكل</option>
</select>

<button>
توليد الأسئلة
</button>

</div>

</body>
</html>
