<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مولد الأسئلة</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
    }

    :root{
      --bg-1:#05070b;
      --bg-2:#070b12;
      --bg-3:#0a1019;
      --card:#060a10;
      --line:rgba(70, 120, 200, 0.10);
      --soft-blue:rgba(125,211,252,0.16);
      --soft-white:rgba(255,255,255,0.10);
    }

    body{
      margin:0;
      font-family:'Tajawal',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
      position:relative;
      background:
        radial-gradient(circle at 18% 22%, rgba(27, 99, 214, 0.08), transparent 22%),
        radial-gradient(circle at 82% 76%, rgba(84, 61, 201, 0.10), transparent 20%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 38%, var(--bg-3) 100%);
    }

    .dashboard-bg{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .bg-noise{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,0.014) 0 1px, transparent 1px),
        radial-gradient(circle at 78% 20%, rgba(255,255,255,0.012) 0 1px, transparent 1px),
        radial-gradient(circle at 22% 72%, rgba(255,255,255,0.010) 0 1px, transparent 1px),
        radial-gradient(circle at 74% 68%, rgba(255,255,255,0.010) 0 1px, transparent 1px);
      background-size: 90px 90px, 110px 110px, 100px 100px, 95px 95px;
      mix-blend-mode:screen;
      opacity:0.55;
    }

    .data-grid{
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(52, 87, 138, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(52, 87, 138, 0.08) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity:0.16;
    }

    .grid-glow{
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, transparent 0%, rgba(37,99,235,0.06) 25%, transparent 50%, rgba(56,189,248,0.05) 75%, transparent 100%);
      opacity:0.22;
    }

    .panel-line{
      position:absolute;
      border:1px solid rgba(47, 86, 150, 0.10);
      border-radius:16px;
      box-shadow:inset 0 0 25px rgba(37,99,235,0.02);
    }

    .panel-1{ top:7%; left:4%; width:23%; height:22%; }
    .panel-2{ top:10%; right:4%; width:21%; height:20%; }
    .panel-3{ bottom:9%; left:5%; width:25%; height:24%; }
    .panel-4{ bottom:8%; right:4%; width:24%; height:23%; }

    .mini-chart,
    .mini-ring,
    .mini-axis{
      position:absolute;
      opacity:0.14;
    }

    .mini-chart{ top:18%; left:54%; width:180px; height:90px; }
    .mini-ring{ right:8%; bottom:10%; width:120px; height:120px; }
    .mini-axis{ bottom:16%; left:33%; width:100px; height:78px; }

    .mini-chart svg,
    .mini-ring svg,
    .mini-axis svg{
      width:100%;
      height:100%;
    }

    /* المعادلات */
    .eq{
      position:absolute;
      color:rgba(255,255,255,0.10);
      font-family:'Caveat', cursive;
      font-weight:700;
      white-space:nowrap;
      user-select:none;
      mix-blend-mode:screen;
      letter-spacing:0.3px;
      line-height:1;
      text-shadow:0 0 2px rgba(255,255,255,0.02);
    }

    .eq-soft{ color:rgba(255,255,255,0.06); }
    .eq-mid{ color:rgba(255,255,255,0.10); }
    .eq-strong{ color:rgba(255,255,255,0.14); }

    /* طبقة النجوم والخطوط */
    .network-layer{
      position:absolute;
      inset:0;
    }

    #networkCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      opacity:0.95;
    }

    .data-star{
      position:absolute;
      border-radius:50%;
      background:#ffffff;
      box-shadow:
        0 0 8px rgba(255,255,255,0.98),
        0 0 16px rgba(255,255,255,0.82),
        0 0 28px rgba(125,211,252,0.55),
        0 0 42px rgba(56,189,248,0.28);
      opacity:1;
      animation:
        starPulse 2.2s ease-in-out infinite,
        starDrift 8s linear infinite;
      transform-origin:center;
    }

    @keyframes starPulse{
      0%,100%{
        transform:scale(0.9);
        opacity:0.60;
      }
      50%{
        transform:scale(1.9);
        opacity:1;
      }
    }

    @keyframes starDrift{
      0%{ transform:translateY(0) translateX(0) scale(1); }
      25%{ transform:translateY(-7px) translateX(4px) scale(1.15); }
      50%{ transform:translateY(-12px) translateX(-4px) scale(1); }
      75%{ transform:translateY(-5px) translateX(6px) scale(1.12); }
      100%{ transform:translateY(0) translateX(0) scale(1); }
    }

    /* جسيمات البيانات */
    .data-particle{
      position:absolute;
      width:2px;
      height:2px;
      border-radius:50%;
      background:rgba(160,220,255,0.85);
      box-shadow:
        0 0 6px rgba(160,220,255,0.35),
        0 0 12px rgba(56,189,248,0.18);
      animation:particleFloat linear infinite;
      opacity:0;
    }

    @keyframes particleFloat{
      0%{
        transform:translateY(105vh) translateX(0);
        opacity:0;
      }
      10%{
        opacity:0.55;
      }
      85%{
        opacity:0.55;
      }
      100%{
        transform:translateY(-10vh) translateX(18px);
        opacity:0;
      }
    }

    /* رموز متحركة صغيرة */
    .float-symbol{
      position:absolute;
      color:rgba(255,255,255,0.08);
      font-weight:700;
      font-family:'Caveat', cursive;
      user-select:none;
      white-space:nowrap;
      animation:floatSlow linear infinite;
      opacity:0;
      text-shadow:0 0 4px rgba(255,255,255,0.03);
    }

    .float-symbol.glow{
      color:rgba(255,255,255,0.20);
      text-shadow:
        0 0 5px rgba(255,255,255,0.25),
        0 0 10px rgba(255,255,255,0.18),
        0 0 18px rgba(125,211,252,0.10);
    }

    @keyframes floatSlow{
      0%{
        transform:translateY(110vh) rotate(0deg);
        opacity:0;
      }
      8%{
        opacity:0.34;
      }
      55%{
        opacity:0.44;
      }
      100%{
        transform:translateY(-10vh) rotate(7deg);
        opacity:0;
      }
    }

    /* الشهب */
    .meteor{
      position:absolute;
      width:340px;
      height:4px;
      border-radius:999px;
      background:linear-gradient(
        90deg,
        rgba(255,255,255,1),
        rgba(255,255,255,0.95),
        rgba(200,235,255,0.78),
        rgba(125,211,252,0.35),
        transparent
      );
      box-shadow:
        0 0 8px rgba(255,255,255,0.95),
        0 0 20px rgba(255,255,255,0.75),
        0 0 36px rgba(125,211,252,0.55),
        0 0 60px rgba(56,189,248,0.28);
      transform:rotate(-22deg);
      opacity:0;
      filter:blur(0.2px);
    }

    .meteor::after{
      content:"";
      position:absolute;
      left:-6px;
      top:50%;
      width:10px;
      height:10px;
      transform:translateY(-50%);
      border-radius:50%;
      background:#ffffff;
      box-shadow:
        0 0 10px rgba(255,255,255,1),
        0 0 22px rgba(255,255,255,0.85),
        0 0 34px rgba(125,211,252,0.55);
    }

    .meteor.down-right{
      animation:meteorDownRight 2.3s linear forwards;
    }

    .meteor.down-left{
      animation:meteorDownLeft 2.2s linear forwards;
    }

    .meteor.shallow{
      animation:meteorShallow 2.6s linear forwards;
    }

    @keyframes meteorDownRight{
      0%{
        transform:translate(-28vw,-18vh) rotate(-22deg);
        opacity:0;
      }
      10%{ opacity:1; }
      100%{
        transform:translate(120vw,72vh) rotate(-22deg);
        opacity:0;
      }
    }

    @keyframes meteorDownLeft{
      0%{
        transform:translate(120vw,-20vh) rotate(202deg);
        opacity:0;
      }
      10%{ opacity:1; }
      100%{
        transform:translate(-40vw,76vh) rotate(202deg);
        opacity:0;
      }
    }

    @keyframes meteorShallow{
      0%{
        transform:translate(-30vw,8vh) rotate(-12deg);
        opacity:0;
      }
      10%{ opacity:1; }
      100%{
        transform:translate(120vw,32vh) rotate(-12deg);
        opacity:0;
      }
    }

    /* البطاقة */
    .card{
      position:relative;
      z-index:2;
      width:100%;
      max-width:560px;
      background:rgba(6,10,16,0.92);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:28px;
      padding:34px 28px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .welcome{
      font-size:36px;
      font-weight:800;
      margin:0 0 8px;
      color:#f4ede3;
      text-align:center;
    }

    .sub{
      font-size:26px;
      font-weight:500;
      margin:0 0 28px;
      color:#c8baa6;
      text-align:center;
    }

    .field{
      margin-bottom:18px;
    }

    label{
      display:block;
      font-size:15px;
      font-weight:700;
      color:#f2e7d8;
      margin-bottom:8px;
    }

    select{
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid #0b5cd6;
      background:rgba(18,20,26,0.60);
      font-size:16px;
      font-family:'Tajawal',sans-serif;
      outline:none;
      transition:0.2s ease;
      color:#f5efe6;
    }

    select:focus{
      border-color:#38bdf8;
      box-shadow:0 0 0 4px rgba(56,189,248,0.12);
      background:rgba(18,20,26,0.85);
    }

    .drop-zone{
      border:2px dashed #0b6cf0;
      border-radius:20px;
      padding:28px 18px;
      text-align:center;
      cursor:pointer;
      background:rgba(18,20,26,0.50);
      transition:0.25s ease;
      position:relative;
      overflow:hidden;
    }

    .drop-zone::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.03), transparent);
      transform:translateX(-100%);
      transition:0.5s ease;
    }

    .drop-zone:hover{
      background:rgba(21,28,42,0.78);
      border-color:#2ea9ff;
      box-shadow:0 0 25px rgba(28,105,255,0.10);
    }

    .drop-zone:hover::before{
      transform:translateX(100%);
    }

    .drop-zone.dragover{
      background:rgba(21,28,42,0.92);
      border-color:#38bdf8;
      transform:scale(1.01);
      box-shadow:0 0 30px rgba(56,189,248,0.15);
    }

    .drop-zone p{
      margin:0 0 8px;
      font-weight:800;
      font-size:18px;
      color:#f5efe6;
    }

    .drop-zone span{
      display:block;
      font-size:14px;
      color:#c7b9a7;
      margin-bottom:12px;
    }

    .file-name{
      margin-top:10px;
      font-size:14px;
      color:#57b9ff;
      font-weight:700;
      word-break:break-word;
    }

    button{
      width:100%;
      border:none;
      border-radius:18px;
      padding:16px;
      font-size:18px;
      font-weight:800;
      font-family:'Tajawal',sans-serif;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg,#18b7df 0%, #2e67f0 55%, #5320d6 100%);
      box-shadow:0 14px 30px rgba(37,99,235,0.28);
      transition:transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 34px rgba(37,99,235,0.32);
    }

    .note{
      margin-top:14px;
      text-align:center;
      font-size:14px;
      color:#b8ab97;
    }

    @media (max-width:900px){
      .eq{
        font-size:11px !important;
      }
      .panel-line,
      .mini-chart,
      .mini-ring,
      .mini-axis{
        opacity:0.08;
      }
    }

    @media (max-width:640px){
      .card{
        padding:28px 18px;
        border-radius:24px;
      }

      .welcome{
        font-size:30px;
      }

      .sub{
        font-size:21px;
      }
    }
  </style>
</head>
<body>

  <div class="dashboard-bg" id="dashboardBg">
    <div class="bg-noise"></div>
    <div class="data-grid"></div>
    <div class="grid-glow"></div>

    <div class="panel-line panel-1"></div>
    <div class="panel-line panel-2"></div>
    <div class="panel-line panel-3"></div>
    <div class="panel-line panel-4"></div>

    <div class="mini-chart">
      <svg viewBox="0 0 180 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="45" x2="170" y2="45" stroke="rgba(125,211,252,0.12)" stroke-width="1.4"/>
        <line x1="90" y1="8" x2="90" y2="82" stroke="rgba(125,211,252,0.12)" stroke-width="1.4"/>
        <path d="M10 45 C28 26, 50 24, 68 45 S104 67, 122 45 S150 20, 170 45"
              stroke="rgba(125,211,252,0.16)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="mini-ring">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="35" stroke="rgba(125,211,252,0.14)" stroke-width="2"/>
        <line x1="10" y1="60" x2="110" y2="60" stroke="rgba(125,211,252,0.08)" stroke-width="1.5"/>
        <line x1="60" y1="10" x2="60" y2="110" stroke="rgba(125,211,252,0.08)" stroke-width="1.5"/>
      </svg>
    </div>

    <div class="mini-axis">
      <svg viewBox="0 0 100 78" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="39" x2="90" y2="39" stroke="rgba(125,211,252,0.07)" stroke-width="1.4"/>
        <line x1="50" y1="10" x2="50" y2="68" stroke="rgba(125,211,252,0.07)" stroke-width="1.4"/>
      </svg>
    </div>

    <div class="network-layer">
      <canvas id="networkCanvas"></canvas>
    </div>
  </div>

  <div class="card">
    <p class="welcome">ارحب مشعل</p>
    <p class="sub">يوسف موصيني عليك و انا بخدمتك</p>

    <div class="field">
      <label for="pdfFile">رفع الملف</label>
      <div class="drop-zone" id="dropZone">
        <p>اسحب ملف PDF هنا</p>
        <span>أو اضغط لاختيار الملف</span>
        <input id="pdfFile" type="file" accept=".pdf" hidden>
        <div class="file-name" id="fileName">لم يتم اختيار ملف بعد</div>
      </div>
    </div>

    <div class="field">
      <label for="questionCount">عدد الأسئلة</label>
      <select id="questionCount">
        <option>5</option>
        <option>10</option>
        <option>15</option>
        <option>20</option>
      </select>
    </div>

    <div class="field">
      <label for="questionType">نوع الأسئلة</label>
      <select id="questionType">
        <option>مقالية</option>
        <option>اختيار من متعدد</option>
        <option>مقالية + اختيار من متعدد</option>
        <option>مسائل رياضية</option>
        <option>الكل</option>
      </select>
    </div>

    <button type="button">توليد الأسئلة</button>
    <div class="note">النسخة الحالية واجهة أولية، وسيتم لاحقًا ربطها بقراءة الملف وتوليد الأسئلة منه.</div>
  </div>

  <script>
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("pdfFile");
    const fileName = document.getElementById("fileName");

    dropZone.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      fileName.textContent = fileInput.files.length ? fileInput.files[0].name : "لم يتم اختيار ملف بعد";
    });

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        fileName.textContent = e.dataTransfer.files[0].name;
      }
    });

    const dashboardBg = document.getElementById("dashboardBg");

    const formulas = [
      "n = ∑ Cₖ xⁿ⁻ᵏ yᵏ",
      "x² + y² = r²",
      "sin²x + cos²x = 1",
      "π ≈ 3.14",
      "y = ax² + bx + c",
      "dy/dx",
      "∫ f(x) dx",
      "log(a/b)",
      "P(A)",
      "µ + σ",
      "x²",
      "y²",
      "tan θ",
      "f(x)",
      "x/2 + y/3",
      "a²+b²",
      "a³+b³",
      "∞",
      "λy",
      "∂/∂x",
      "log x",
      "sin x",
      "cos x",
      "tan x",
      "∇f",
      "σ²",
      "P(B)",
      "x+y",
      "x−y",
      "√2",
      "∑n",
      "kλ",
      "x/4",
      "f’(x)",
      "A=Lw"
    ];

    function createFormula() {
      const el = document.createElement("span");

      const variantChance = Math.random();
      if (variantChance > 0.72) {
        el.className = "eq eq-strong";
      } else if (variantChance > 0.36) {
        el.className = "eq eq-mid";
      } else {
        el.className = "eq eq-soft";
      }

      el.textContent = formulas[Math.floor(Math.random() * formulas.length)];
      el.style.left = Math.random() * 100 + "vw";
      el.style.top = Math.random() * 100 + "vh";
      el.style.fontSize = (6 + Math.random() * 7) + "px";
      el.style.transform = "rotate(" + (Math.random() * 16 - 8) + "deg)";

      dashboardBg.appendChild(el);
    }

    for (let i = 0; i < 2600; i++) {
      createFormula();
    }

    /* النجوم البيضاء */
    function createStar() {
      const star = document.createElement("span");
      star.className = "data-star";
      star.style.left = Math.random() * 100 + "vw";
      star.style.top = Math.random() * 100 + "vh";

      const size = 2 + Math.random() * 3.8;
      star.style.width = size + "px";
      star.style.height = size + "px";

      const pulseDuration = (1.4 + Math.random() * 1.8) + "s";
      const driftDuration = (6 + Math.random() * 8) + "s";
      star.style.animationDuration = `${pulseDuration}, ${driftDuration}`;

      dashboardBg.appendChild(star);
    }

    for (let i = 0; i < 420; i++) {
      createStar();
    }

    /* الرموز الصغيرة المتحركة */
    const floatSymbols = [
      "+","-","×","÷","=","√","∑","π","∞","∆","∂","θ","λ","x²","y²","f(x)","dy/dx","log","sin","cos","tan","μ","σ"
    ];

    function createFloatSymbol() {
      const el = document.createElement("span");
      const isGlow = Math.random() > 0.82;
      el.className = isGlow ? "float-symbol glow" : "float-symbol";
      el.textContent = floatSymbols[Math.floor(Math.random() * floatSymbols.length)];
      el.style.left = Math.random() * 100 + "vw";
      el.style.top = (100 + Math.random() * 5) + "vh";
      el.style.fontSize = (5 + Math.random() * 4) + "px";
      el.style.animationDuration = (16 + Math.random() * 10) + "s";

      dashboardBg.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 30000);
    }

    for (let i = 0; i < 420; i++) {
      setTimeout(createFloatSymbol, i * 20);
    }

    setInterval(createFloatSymbol, 55);

    /* الشهب */
    function createMeteor() {
      const meteor = document.createElement("div");
      const variants = ["down-right", "down-left", "shallow"];
      const variant = variants[Math.floor(Math.random() * variants.length)];
      meteor.className = `meteor ${variant}`;

      if (variant === "down-right") {
        meteor.style.top = (Math.random() * 28) + "vh";
        meteor.style.left = (-30 - Math.random() * 20) + "vw";
      } else if (variant === "down-left") {
        meteor.style.top = (Math.random() * 25) + "vh";
        meteor.style.left = (100 + Math.random() * 10) + "vw";
      } else {
        meteor.style.top = (5 + Math.random() * 24) + "vh";
        meteor.style.left = (-35 - Math.random() * 20) + "vw";
      }

      dashboardBg.appendChild(meteor);

      setTimeout(() => {
        meteor.remove();
      }, 2800);
    }

    function startMeteorShower() {
      const count = 2 + Math.floor(Math.random() * 2); // 2 أو 3
      for (let i = 0; i < count; i++) {
        setTimeout(createMeteor, i * (500 + Math.random() * 500));
      }
    }

    setTimeout(startMeteorShower, 2200);
    setInterval(startMeteorShower, 9000);

    /* شبكة البيانات بين النجوم */
    const canvas = document.getElementById("networkCanvas");
    const ctx = canvas.getContext("2d");

    const networkNodes = [];
    const nodeCount = 42;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initNodes() {
      networkNodes.length = 0;
      for (let i = 0; i < nodeCount; i++) {
        networkNodes.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - 0.5) * 0.18,
          vy: (Math.random() - 0.5) * 0.18,
          r: 0.8 + Math.random() * 1.7
        });
      }
    }

    function drawNetwork() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < networkNodes.length; i++) {
        const a = networkNodes[i];

        a.x += a.vx;
        a.y += a.vy;

        if (a.x < 0 || a.x > canvas.width) a.vx *= -1;
        if (a.y < 0 || a.y > canvas.height) a.vy *= -1;

        ctx.beginPath();
        ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(180, 220, 255, 0.18)";
        ctx.fill();

        for (let j = i + 1; j < networkNodes.length; j++) {
          const b = networkNodes[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 150) {
            const alpha = (1 - dist / 150) * 0.12;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(120, 190, 255, ${alpha})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(drawNetwork);
    }

    /* جسيمات البيانات */
    function createParticle() {
      const p = document.createElement("span");
      p.className = "data-particle";
      p.style.left = Math.random() * 100 + "vw";
      p.style.top = (100 + Math.random() * 8) + "vh";
      p.style.animationDuration = (10 + Math.random() * 8) + "s";
      dashboardBg.appendChild(p);

      setTimeout(() => {
        p.remove();
      }, 22000);
    }

    for (let i = 0; i < 180; i++) {
      setTimeout(createParticle, i * 60);
    }

    setInterval(createParticle, 120);

    resizeCanvas();
    initNodes();
    drawNetwork();

    window.addEventListener("resize", () => {
      resizeCanvas();
      initNodes();
    });
  </script>

</body>
</html>
